services:
  - type: web
    name: rift-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: out
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /candy
        destination: /candy.html
      - type: rewrite
        source: /insight
        destination: /insight.html
