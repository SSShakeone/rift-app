services:
  - type: web
    name: rift-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: out
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://eiwufvaswxsyrgzdalrv.supabase.co
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: sb_publishable_fEgGQg0cBCL_aPcBF3xqhA_FPMRnfWv
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /candy
        destination: /candy.html
      - type: rewrite
        source: /insight
        destination: /insight.html
